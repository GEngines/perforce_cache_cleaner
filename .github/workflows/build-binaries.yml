name: Build Windows and Linux Binaries and Attach to Release

on:
  release:
    types: [published]

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - os: windows-latest
            binary_name: P4CacheCleaner-windows
            artifact_glob: dist/*.exe
          - os: ubuntu-latest
            binary_name: P4CacheCleaner-linux
            artifact_glob: dist/P4CacheCleaner-linux.bin

    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        working-directory: ${{ github.workspace }}
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build Windows EXE with PyInstaller (with icon and resources)
        if: matrix.os == 'windows-latest'
        working-directory: ${{ github.workspace }}
        run: |
          pyinstaller --onefile -w --icon=resources\icons\icon.ico --add-data "resources;resources" --name "${{ matrix.binary_name }}" p4p_cleaner_advanced.py

      - name: Build Linux binary with PyInstaller (with resources)
        if: matrix.os == 'ubuntu-latest'
        working-directory: ${{ github.workspace }}
        run: |
          pyinstaller --onefile --add-data "resources:resources" --name "${{ matrix.binary_name }}" p4p_cleaner_advanced.py
          mv "dist/${{ matrix.binary_name }}" "dist/${{ matrix.binary_name }}.bin"
          chmod +x "dist/${{ matrix.binary_name }}.bin"

      - name: Upload binary to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact_glob }}
          token: ${{ secrets.GITHUB_TOKEN }}
